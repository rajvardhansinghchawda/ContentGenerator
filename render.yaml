services:
  # 1. Django API (Backend)
  - type: web
    name: eduflow-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    rootDir: backend
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false # User will provide Neon URL
      - key: REDIS_URL
        sync: false # User will provide Upstash URL
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false # e.g., https://eduflow-backend.onrender.com/api/auth/google/callback/
      - key: GROQ_API_KEY
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false # e.g., https://eduflow-frontend.onrender.com
      - key: ALLOWED_HOSTS
        value: "*" # Or specific backend host
      - key: CORS_ALLOWED_ORIGINS
        sync: false # Should match frontend URL

  # 2. Celery Worker
  - type: worker
    name: eduflow-worker
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker -l info"
    rootDir: backend
    envVars:
      - fromService:
          type: web
          name: eduflow-backend
          envVarKey: DATABASE_URL
      - fromService:
          type: web
          name: eduflow-backend
          envVarKey: REDIS_URL
      - fromService:
          type: web
          name: eduflow-backend
          envVarKey: SECRET_KEY
      - fromService:
          type: web
          name: eduflow-backend
          envVarKey: GROQ_API_KEY
      - fromService:
          type: web
          name: eduflow-backend
          envVarKey: TOKEN_ENCRYPTION_KEY
      - fromService:
          type: web
          name: eduflow-backend
          envVarKey: GOOGLE_CLIENT_ID
      - fromService:
          type: web
          name: eduflow-backend
          envVarKey: GOOGLE_CLIENT_SECRET

  # 3. React Frontend (Vite)
  - type: static_site
    name: eduflow-frontend
    runtime: node
    buildCommand: "npm install && npm run build"
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: eduflow-backend
          property: host
