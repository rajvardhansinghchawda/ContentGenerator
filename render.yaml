services:
  # 1. Django API (Backend)
  - type: web
    name: eduflow-backend
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    rootDir: backend
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: FRONTEND_URL
        value: https://frontend-jugaadu.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://frontend-jugaadu.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://frontend-jugaadu.onrender.com
      - key: GOOGLE_REDIRECT_URI
        value: https://eduflow-backend-v0zp.onrender.com/api/auth/google/callback/


      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True" # Run tasks synchronously since we have no separate worker

  # 2. React Frontend (Vite)
  - type: web
    name: frontend-jugaadu
    runtime: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        value: https://eduflow-backend-v0zp.onrender.com

